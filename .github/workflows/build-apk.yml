name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Capacitor project
        run: |
          set -e
          mkdir -p www
          cp index.html www/index.html
          npm init -y
          npm install @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6
          npx cap init "TapLog" "com.yokomichi182.taplog" --web-dir www
          npx cap add android
          npx cap copy android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Assemble debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk tap-log.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tap-log-apk
          path: tap-log.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: タップ記録 APK (最新)
          files: tap-log.apk
